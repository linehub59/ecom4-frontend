<!DOCTYPE html>
<html>
<head>
  <title>My Orders</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f5f5f5;
    }

    .container {
      max-width: 900px;
      margin: auto;
      padding: 20px;
    }

    h2 {
      text-align: center;
    }

    .order {
      background: white;
      padding: 20px;
      margin-top: 15px;
      border-radius: 10px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .status {
      padding: 5px 10px;
      border-radius: 5px;
      font-size: 14px;
    }

    .pending { background: orange; color: white; }
    .completed { background: green; color: white; }
    .cancelled { background: red; color: white; }

    .item {
      display: flex;
      justify-content: space-between;
      margin-top: 10px;
      border-bottom: 1px solid #eee;
      padding-bottom: 8px;
    }

    .total {
      font-weight: bold;
      margin-top: 10px;
    }

    button {
      margin-top: 10px;
      padding: 10px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    .cancel-btn {
      background: red;
      color: white;
    }

    .empty {
      text-align: center;
      margin-top: 50px;
      color: gray;
    }
  </style>
</head>

<body>

<div class="container">
  <h2>My Orders</h2>
  <div id="orders"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/12.10.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/12.10.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore-compat.js"></script>

<script>
// 🔥 YOUR FIREBASE CONFIG
const firebaseConfig = {
apiKey: "AIzaSyAHr7pLDNNxnqFpxT5DuSPpEeluoMoky_s",
authDomain: "ecom1-379aa.firebaseapp.com",
projectId: "ecom1-379aa",
storageBucket: "ecom1-379aa.firebasestorage.app",
messagingSenderId: "538616597487",
appId: "1:538616597487:web:32940713b73d7fedb0841a",
measurementId: "G-PK4XFDEFBV"
};

firebase.initializeApp(firebaseConfig)
const auth = firebase.auth();

auth.onAuthStateChanged(user => {
  if (!user) {
    alert("Not logged in");
    return;
  }

  alert("Logged in:");
  loadOrders();
});
  
  
const BASE_URL = "http://127.0.0.1:3000/api";




// 📦 Fetch orders
async function loadOrders() {
  const user = auth.currentUser;

  const token = await user.getIdToken();
  
  const res = await fetch(`${BASE_URL}/orders`, {
    headers: {
    Authorization: "Bearer " + token
  }
  });
  const orders = await res.json();
  alert(JSON.stringify(orders));
  renderOrders(orders);
}

// 🎨 Render orders
function renderOrders(orders) {
  const container = document.getElementById("orders");

  if (!orders.length) {
    container.innerHTML = `<div class="empty">No orders yet</div>`;
    return;
  }

  container.innerHTML = "";

  orders.forEach(order => {
    let itemsHtml = "";

    order.cartItems.forEach(item => {
      itemsHtml += `
        <div class="item">
          <div>${item.name} x${item.count}</div>
          <div>KES ${item.price * item.count}</div>
        </div>
      `;
    });

    const statusClass = order.status.toLowerCase();

    const div = document.createElement("div");
    div.className = "order";

    div.innerHTML = `
      <div class="header">
        <div><b>Order ID:</b> ${order.id}</div>
        <div class="status ${statusClass}">${order.status}</div>
      </div>

      ${itemsHtml}

      <div class="total">Total: KES ${order.total}</div>

      ${
        order.status === "pending"
          ? `<button class="cancel-btn" onclick="cancelOrder('${order.id}')">Cancel Order</button>`
          : ""
      }
    `;

    container.appendChild(div);
  });
}

// ❌ Cancel order
async function cancelOrder(id) {
  const user = auth.currentUser;

  const token = await user.getIdToken();

  const res = await fetch(`${BASE_URL}/orders/${id}`, {
    method: "PUT",
    headers: {
      "Content-Type": "application/json",
      Authorization: "Bearer " + token
    },
    body: JSON.stringify({ status: "cancelled" })
  });
  
  
  const data = await res.json();
  alert(JSON.stringify(data));
  location.reload();
}
</script>

</body>
</html>
